name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: Test (Linux)
    runs-on: ubuntu-latest
    # Wedge guard, freebsd-test's rationale applied to every job: a hung test
    # must fail the job in minutes, not burn the 6 h default (the 0.7.2
    # campaign's local 8 h sender-wedge, translated to CI). Budgets are
    # generous multiples of observed warm runs.
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --workspace

  msrv:
    name: MSRV (1.85)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.85
      - uses: Swatinem/rust-cache@v2
      # Check (not test) on the declared floor: proves the rust-version claim
      # in Cargo.toml without doubling the test wall-clock.
      - run: cargo check --workspace --all-targets

  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --all-targets -- -D warnings
      - run: cargo fmt --all -- --check

  semver:
    name: SemVer
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      # Compares the library crate's public API against the latest version
      # published to crates.io and fails if the Cargo.toml version bump is
      # insufficient for the API change (e.g. a breaking change on a patch bump).
      # Caught #50's Server field additions, which required the 0.5.x -> 0.6.0
      # major bump. riperf3-cli is a binary (no library API) and is not checked.
      - uses: obi1kenobi/cargo-semver-checks-action@v2
        with:
          package: riperf3

  cross-check:
    name: Cross-platform (${{ matrix.target }})
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      matrix:
        target:
          - x86_64-pc-windows-msvc
          - aarch64-apple-darwin
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}
      - run: cargo check --target ${{ matrix.target }}

  # Native build + test on macOS and Windows (#39). The cross-check job above
  # only cargo-checks those targets (cross-compiled from Linux) — it never builds
  # or runs them natively, so platform-specific runtime behavior (e.g. the macOS
  # tcp_connection_info path, winsock) is unverified. These jobs run the real test
  # suite on native runners.
  #
  # Status (live main ruleset, 2026-06-10): BOTH matrix legs are required
  # branch-protection checks — Native test (windows-latest) and Native test
  # (macos-latest); macOS was promoted from informational after running
  # consistently clean through the 0.7.2 campaign. fail-fast: false so a
  # failure on one OS doesn't cancel the other.
  native-test:
    name: Native test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    # Windows cold-cache builds are the slow tail; 40 is still 9× better than
    # the default on a wedge.
    timeout-minutes: 40
    strategy:
      fail-fast: false
      matrix:
        os:
          - macos-latest
          - windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          key: native-${{ matrix.os }}
      - run: cargo test --workspace

  # Static/musl build check (#39). riperf3 ships in containers; musl is where
  # libc differences (the libc/nix syscall surface) tend to bite. cargo check
  # doesn't link, so musl-gcc isn't needed. REQUIRED check since 2026-06-10.
  musl-check:
    name: musl check
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-musl
      - uses: Swatinem/rust-cache@v2
        with:
          key: musl
      - run: cargo check --workspace --target x86_64-unknown-linux-musl

  # Native build + test on FreeBSD in a VM (#39). FreeBSD carries real
  # platform-specific code that no other job compiles: the sendfile arity
  # (stream.rs), the FreeBSD tcp_info field names (tcp_info.rs), the sendmmsg
  # sender, and TCP_CONGESTION. cargo check from Linux can't cover it (some of
  # this is behind `#[cfg(target_os = "freebsd")]`), and GitHub has no native
  # FreeBSD runner — hence a VM via vmactions/freebsd-vm (QEMU; Rust from the
  # FreeBSD `rust` package). `release` is pinned for reproducibility.
  #
  # REQUIRED check (added informational in 0.6.1, promoted the same release once
  # the first runs were clean): it gates merges like the Linux, Windows, and
  # macOS native jobs (macOS promoted 2026-06-10).
  freebsd-test:
    name: Native test (FreeBSD)
    runs-on: ubuntu-latest
    # The emulated VM (no build cache, plus a test suite that spins up real
    # loopback servers) is the most likely place for a hang; fail fast rather
    # than burn the 6h default. Generous — a cold build + test runs ~5-6 min.
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - name: Build + test in a FreeBSD VM
        uses: vmactions/freebsd-vm@v1
        with:
          # Pinned for reproducibility; bump when this 14.x minor goes EOL (the
          # vmactions image for it is eventually dropped).
          release: "14.2"
          usesh: true
          # Runs as root before the workspace sync: install the toolchain.
          prepare: |
            pkg install -y rust
          # cargo build proves codegen + link (cargo check does neither);
          # cargo test then exercises the suite on real FreeBSD.
          run: |
            cargo build --workspace
            cargo test --workspace
